name: Edge Functions CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/edge-ci.yml'
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/edge-ci.yml'

jobs:
  deno:
    name: Deno fmt + lint + tests + PII guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check supabase/functions/

      - name: Lint
        run: deno lint supabase/functions/

      - name: Shared helpers tests
        run: deno test --allow-net=jsr.io supabase/functions/_shared/

      - name: PII guard (§7.5/§7.8)
        run: bash scripts/check_pii_in_logs.sh
