name: Deploy Flutter Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-web.yml"
      - "assets/**"
      - "lib/**"
      - "web/**"
      - "pubspec.yaml"
      - "pubspec.lock"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Flutter dotenv asset
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || 'https://us.i.posthog.com' }}
        run: |
          : "${SUPABASE_URL:?SUPABASE_URL secret is required}"
          : "${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY secret is required}"
          {
            printf 'SUPABASE_URL=%s\n' "$SUPABASE_URL"
            printf 'SUPABASE_ANON_KEY=%s\n' "$SUPABASE_ANON_KEY"
            printf 'SENTRY_DSN=%s\n' "$SENTRY_DSN"
            printf 'SENTRY_ENV=web-production\n'
            printf 'POSTHOG_API_KEY=%s\n' "$POSTHOG_API_KEY"
            printf 'POSTHOG_HOST=%s\n' "$POSTHOG_HOST"
          } > .env

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href /ninho/

      - uses: actions/configure-pages@v6
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - id: deployment
        uses: actions/deploy-pages@v4
