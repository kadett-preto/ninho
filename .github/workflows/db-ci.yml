name: Database CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'supabase/config.toml'
      - '.github/workflows/db-ci.yml'
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'supabase/config.toml'
      - '.github/workflows/db-ci.yml'

jobs:
  rls-tests:
    name: Migrations + pgTAP RLS tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.101.0

      - name: Add swap space
        # GHA ubuntu-latest tem 16 GB RAM. Stack Supabase (db + kong +
        # gotrue + postgrest + realtime + storage + edge_runtime) +
        # extensions (pg_cron, pg_net, pgsodium, vector) sob carga estoura
        # o limite e OOM-kill o Postgres backend no meio dos testes.
        # +6 GB swap em /mnt (disco efêmero maior) mata o flake.
        run: |
          set -euxo pipefail
          # Desliga swap pré-existente do runner (geralmente /mnt/swapfile 4 GB).
          sudo swapoff -a || true
          # Recria com 6 GB em /mnt (mais espaço que /).
          sudo rm -f /mnt/swapfile
          sudo fallocate -l 6G /mnt/swapfile || \
            sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=6144
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h
          swapon --show

      - name: Start local Supabase
        run: supabase start

      - name: Debug — container memory before tests
        run: docker stats --no-stream --format 'table {{.Name}}\t{{.MemUsage}}\t{{.MemPerc}}'

      - name: Run pgTAP tests
        run: supabase test db

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
